[build-system]
requires = ["setuptools>=68.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "ryd-gate"
version = "0.1.0"
description = "Simulation and optimization of Rydberg-atom entangling gates"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Siyuan Chen"},
]
dependencies = [
    "numpy",
    "qutip",
    "scipy",
    "matplotlib",
    "arc-alkali-rydberg-calculator",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
    "sphinx",
    "sphinx-rtd-theme",
    "myst-parser",
]
app = [
    "streamlit>=1.30",
    "plotly>=5.18",
]
tn = [
    "physics-tenpy>=1.0",
]
tn-2d = [
    "physics-tenpy>=1.0",
    "yastn @ git+https://github.com/yastn/yastn.git",
    "quimb",
    "cotengra",
    "autoray",
    "networkx",
]
tn-ttn = [
    "h5py>=3.10.0",
    "tqdm>=4.65.0",
]
nqs = [
    "netket",
    "jVMC",
]
gputn-cu12 = [
    "cupy-cuda12x[ctk]>=13.0",
    # V100 / sm_70 compatible cuQuantum 25.03 stack.
    "cuquantum-python-cu12==25.3.0.post0",
    "cutensornet-cu12==2.7.0",
    "custatevec-cu12==1.8.0",
    "cudensitymat-cu12==0.1.0",
    "cutensor-cu12==2.2.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"ryd_gate._vendor.pytreenet" = ["LICENSE"]
"ryd_gate.backends.itensor" = ["julia/*.jl", "julia/*.toml", "julia/src/*.jl"]

[tool.ruff]
target-version = "py310"
line-length = 120
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long (research code has long expressions)
    "E741",   # ambiguous variable name (physics uses I, l, etc.)
    "F403",   # star imports (arc, qutip use this pattern)
    "F405",   # may be undefined from star import
    "W291",   # trailing whitespace
    "W293",   # blank line whitespace
    "E731",   # lambda assignment
]

[tool.ruff.lint.per-file-ignores]
"src/ryd_gate/ideal_cz.py" = ["F401", "I001"]
"src/ryd_gate/backends/exact/legacy/atomic_system.py" = ["E741", "I001"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not slow'"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
